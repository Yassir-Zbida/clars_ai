# Continuous integration: lint, unit tests, production build, smoke E2E.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Next.js may evaluate server code at build time; satisfy adapters without real secrets.
          MONGODB_URI: mongodb://127.0.0.1:27017/ci
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
          NEXTAUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          MONGODB_URI: mongodb://127.0.0.1:27017/ci
          AUTH_SECRET: ci-e2e-placeholder-secret-min-32-chars-long
          NEXTAUTH_SECRET: ci-e2e-placeholder-secret-min-32-chars-long
          NEXTAUTH_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
