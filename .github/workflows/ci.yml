# Continuous integration: lint, unit tests, production build, smoke E2E.
# Single job: one npm ci + one build; E2E serves `output: 'standalone'` via Playwright (node server.js).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  # Shared for build + Playwright (NextAuth / public URL)
  MONGODB_URI: mongodb://127.0.0.1:27017/ci
  AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
  NEXTAUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

jobs:
  ci:
    name: Lint, test, build, E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Playwright smoke (production server)
        run: npm run test:e2e
        env:
          CI: true
          NODE_ENV: production
          PLAYWRIGHT_USE_NEXT_START: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
